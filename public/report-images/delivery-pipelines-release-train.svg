<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Delivery pipelines release train diagram">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .stroke { fill: none; stroke: #0a0a0a; stroke-width: 3; }
      .muted { fill: none; stroke: #0a0a0a; stroke-opacity: 0.35; stroke-width: 2; }
      .box { fill: none; stroke: #0a0a0a; stroke-width: 3; }
      .title { font: 700 26px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #0a0a0a; letter-spacing: 0.22em; text-transform: uppercase; }
      .label { font: 600 18px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #0a0a0a; letter-spacing: 0.08em; }
      .small { font: 500 14px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberations Mono, monospace; fill: #0a0a0a; letter-spacing: 0.12em; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6" fill="#0a0a0a" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900" />

  <!-- subtle grid -->
  <g opacity="0.16">
    <path class="muted" d="M0 150 H1600" />
    <path class="muted" d="M0 300 H1600" />
    <path class="muted" d="M0 450 H1600" />
    <path class="muted" d="M0 600 H1600" />
    <path class="muted" d="M0 750 H1600" />
    <path class="muted" d="M200 0 V900" />
    <path class="muted" d="M400 0 V900" />
    <path class="muted" d="M600 0 V900" />
    <path class="muted" d="M800 0 V900" />
    <path class="muted" d="M1000 0 V900" />
    <path class="muted" d="M1200 0 V900" />
    <path class="muted" d="M1400 0 V900" />
  </g>

  <text x="80" y="92" class="title">Delivery Pipelines</text>
  <text x="80" y="126" class="small">A RELEASE TRAIN WITH GATES &amp; ENV PROMOTION</text>

  <!-- train line -->
  <path class="stroke" d="M120 740 H1480" />
  <path class="stroke" d="M120 770 H1480" />
  <path class="muted" d="M160 770 V740" />
  <path class="muted" d="M260 770 V740" />
  <path class="muted" d="M360 770 V740" />
  <path class="muted" d="M460 770 V740" />
  <path class="muted" d="M560 770 V740" />
  <path class="muted" d="M660 770 V740" />
  <path class="muted" d="M760 770 V740" />
  <path class="muted" d="M860 770 V740" />
  <path class="muted" d="M960 770 V740" />
  <path class="muted" d="M1060 770 V740" />
  <path class="muted" d="M1160 770 V740" />
  <path class="muted" d="M1260 770 V740" />
  <path class="muted" d="M1360 770 V740" />
  <path class="muted" d="M1460 770 V740" />

  <!-- stages -->
  <rect x="120" y="190" width="300" height="150" class="box" />
  <text x="150" y="240" class="label">Commit</text>
  <text x="150" y="270" class="small">branch / PR</text>

  <rect x="470" y="190" width="320" height="150" class="box" />
  <text x="500" y="240" class="label">Build</text>
  <text x="500" y="270" class="small">artifact + SBOM</text>

  <rect x="840" y="190" width="320" height="150" class="box" />
  <text x="870" y="240" class="label">Test</text>
  <text x="870" y="270" class="small">unit • integration</text>

  <rect x="1210" y="190" width="320" height="150" class="box" />
  <text x="1240" y="240" class="label">Deploy</text>
  <text x="1240" y="270" class="small">promote envs</text>

  <!-- gates row -->
  <rect x="120" y="390" width="1440" height="230" class="box" />
  <text x="150" y="440" class="label">Gates (non-negotiable)</text>
  <text x="150" y="470" class="small">lint • SAST • secret scan • policy • approvals</text>

  <rect x="150" y="505" width="310" height="70" class="box" />
  <text x="170" y="548" class="small">Quality</text>

  <rect x="490" y="505" width="340" height="70" class="box" />
  <text x="510" y="548" class="small">Security</text>

  <rect x="860" y="505" width="330" height="70" class="box" />
  <text x="880" y="548" class="small">Compliance</text>

  <rect x="1220" y="505" width="300" height="70" class="box" />
  <text x="1240" y="548" class="small">Approvals</text>

  <!-- arrows between stages -->
  <path class="stroke" d="M420 265 H470" marker-end="url(#arrow)" />
  <path class="stroke" d="M790 265 H840" marker-end="url(#arrow)" />
  <path class="stroke" d="M1160 265 H1210" marker-end="url(#arrow)" />

  <!-- arrows to gates -->
  <path class="stroke" d="M270 340 V390" marker-end="url(#arrow)" />
  <path class="stroke" d="M630 340 V390" marker-end="url(#arrow)" />
  <path class="stroke" d="M1000 340 V390" marker-end="url(#arrow)" />
  <path class="stroke" d="M1370 340 V390" marker-end="url(#arrow)" />

  <!-- caption -->
  <rect x="80" y="820" width="1440" height="1" fill="#0a0a0a" fill-opacity="0.5" />
  <text x="80" y="858" class="small">Generated diagram • release train • explicit gates for confidence</text>
</svg>
